name: Pip Audit
on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tool
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict
